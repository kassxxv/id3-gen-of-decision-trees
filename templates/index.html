<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ID3 Decision Tree Generator</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="header-inner">
    <a href="/" class="logo">ID3<span class="logo-dot">.</span></a>
    <nav class="nav">
      <a href="/" class="active">App</a>
      <a href="/theory">Theory</a>
    </nav>
  </div>
</header>

<main>

  <!-- HERO -->
  <section class="hero">
<h1>Decision Tree </h1>
    <p>Upload a dataset. Build an ID3 tree.</p>
    <div class="hero-line"></div>
  </section>

  <!-- 01 UPLOAD -->
  <section class="card" id="uploadSection">
    <div class="card-header">
      <span class="pill pill-orange">01&nbsp;&nbsp;Upload</span>
    </div>
    <div class="card-body">
      <div class="drop-zone" id="dropZone">
        <div class="drop-zone-icon">&#8593;</div>
        <p>Drag &amp; drop your CSV file here</p>
        <div class="or">or</div>
        <button class="btn-browse" id="browseBtn">Browse Files</button>
        <input type="file" id="fileInput" accept=".csv" style="display:none" />
        <div class="file-status hidden" id="fileStatus"></div>
      </div>

      <div class="controls-row" style="margin-top:20px">
        <div class="control-group">
          <label class="control-label">Target Column</label>
          <select class="control-select" id="targetSelect" disabled>
            <option>—</option>
          </select>
        </div>
        <div class="control-group">
          <label class="control-label">Test Split</label>
          <select class="control-select" id="splitSelect">
            <option value="0.1">10%</option>
            <option value="0.2" selected>20%</option>
            <option value="0.3">30%</option>
            <option value="0.4">40%</option>
          </select>
        </div>
        <div class="controls-spacer"></div>
        <button class="btn-primary" id="buildBtn" disabled>Build Tree <span>&#8594;</span></button>
      </div>
    </div>
  </section>

  <!-- 02 DATASET PREVIEW -->
  <section class="card section-hidden" id="datasetSection">
    <div class="card-header">
      <span class="pill pill-teal">02&nbsp;&nbsp;Dataset Preview</span>
      <span id="datasetInfo" style="font-size:12px;color:var(--text-dim)"></span>
    </div>
    <div class="dataset-table-wrap" id="datasetTableWrap">
    </div>
  </section>

  <!-- 03 BUILDING PROCESS -->
  <section class="card section-hidden" id="animationSection">
    <div class="card-header">
      <span class="pill pill-purple">03&nbsp;&nbsp;Building Process</span>
    </div>
    <div class="card-body">
      <div class="anim-controls">
        <button class="btn-secondary" id="animPlay">&#9654; Play</button>
        <button class="btn-secondary" id="animPause">&#9208; Pause</button>
        <button class="btn-secondary" id="animStep">&#9197; Step</button>
        <button class="btn-accent" id="animSkip">Skip to Result &#8594;</button>
        <span class="step-counter">Step <span id="stepCurrent">0</span> / <span id="stepTotal">0</span></span>
      </div>
      <div class="step-info hidden" id="stepInfo">
        <div class="step-info-header" id="stepInfoHeader"></div>
        <div id="stepInfoBars"></div>
        <div class="step-class-dist" id="stepClassDist"></div>
      </div>
    </div>
  </section>

  <!-- 04 METRICS -->
  <section class="card section-hidden" id="metricsSection">
    <div class="card-header">
      <span class="pill pill-green">04&nbsp;&nbsp;Metrics</span>
    </div>
    <div class="card-body">
      <div class="metrics-grid" id="metricsGrid"></div>
      <div class="metrics-grid-secondary" id="metricsGridSecondary"></div>
      <div class="fi-section" id="fiSection">
        <div class="fi-title">Feature Importances</div>
        <div id="fiBars"></div>
      </div>
      <div>
        <div class="cm-title">Confusion Matrix</div>
        <table class="cm-table" id="cmTable"></table>
      </div>
    </div>
  </section>

  <!-- 05 DECISION TREE -->
  <section class="card section-hidden" id="treeSection" style="padding-bottom:0">
    <div class="card-header">
      <span class="pill pill-teal">05&nbsp;&nbsp;Decision Tree</span>
      <div class="tree-controls">
        <button id="zoomIn">+</button>
        <button id="zoomReset">Reset</button>
        <button id="zoomOut">&minus;</button>
      </div>
    </div>
    <div class="tree-canvas" id="treeCanvas">
      <div class="node-detail hidden" id="nodeDetail">
        <button class="node-detail-close" id="nodeDetailClose">&times;</button>
        <div id="nodeDetailContent"></div>
      </div>
    </div>
  </section>

  <!-- 06 PREDICT -->
  <section class="card section-hidden" id="predictSection">
    <div class="card-header">
      <span class="pill pill-orange">06&nbsp;&nbsp;Predict</span>
    </div>
    <div class="card-body">
      <div class="predict-form" id="predictForm"></div>
      <div class="predict-actions">
        <button class="btn-primary" id="predictBtn">Predict <span>&#8594;</span></button>
        <div class="predict-result hidden" id="predictResult">
          <span class="label">Prediction:</span>
          <span class="value" id="predictValue"></span>
        </div>
      </div>
    </div>
  </section>
</main>

<!-- LOADER -->
<div class="loader-overlay hidden" id="loader">
  <div class="loader-spinner"></div>
</div>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="/static/tree.js"></script>

</body>
</html>
